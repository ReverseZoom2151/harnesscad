name: ci

# The repository had NO CI. `eval/selftest/` measured the harness -- precision
# per verifier, six-engine differential, metamorphic laws, field liveness -- and
# nothing enforced any of it. A rule with precision 0.4 could be merged the next
# day, and that is precisely the bug that lost the controlled experiment in
# assets/pressure/report.md (typed diagnostics lost to blind resampling by 8.3
# points; every net loss was a correct part broken because a false diagnostic
# told the model to break it).
#
# A capability the loop is not gated on is a decoration. This file is the gate.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:

  # -------------------------------------------------------------------------
  # 1. THE PRECISION FLOOR. The most important job in this file.
  #
  # eval/selftest/fleet_audit.py measures precision/recall PER VERIFIER over a
  # known-good and a known-bad corpus. eval/gates/precision_floor.py enforces a
  # COMMITTED floor per verifier:
  #   * a MODEL-FACING verifier (one whose codes are PROVEN/MEASURED and are
  #     therefore written into the model's retry prompt) must have precision 1.0;
  #   * a HEURISTIC verifier is pinned at its measured value and may not regress;
  #   * a verifier absent from the baseline fails the build outright.
  # -------------------------------------------------------------------------
  precision-floor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .
      - name: fleet precision floor (fails if any model-facing verifier lies)
        run: python -m harnesscad.eval.gates.precision_floor
      - name: judge calibration gate (an uncalibrated judge may not instruct)
        run: python -m harnesscad.eval.gates.judge_gate

  # -------------------------------------------------------------------------
  # 2. The self-evaluation oracles, each as its own process.
  #
  # --strict turns a finding into a non-zero exit. differential and properties
  # need a geometry engine; frep is stdlib and always available, so these run on
  # a bare runner with no optional deps.
  # -------------------------------------------------------------------------
  selftest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        oracle: [differential, properties, golden]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .
      - name: selftest --${{ matrix.oracle }} --strict
        run: python -m harnesscad.core.cli selftest --${{ matrix.oracle }} --backend frep --strict

  # -------------------------------------------------------------------------
  # 2b. The output gate. "Every artifact leaving the harness is either verified
  #     valid, or refused with a reason. There is no third outcome." Its property
  #     test is the only thing that keeps that sentence true.
  # -------------------------------------------------------------------------
  output-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .
      - run: python -m unittest tests.io.test_gate

  # -------------------------------------------------------------------------
  # 3. Field liveness: changing any op field must CHANGE the geometry.
  #
  # Three backends were silently dropping fields -- an op parameter the model
  # sets and the kernel ignores is a lie the grader cannot see. Runs only if the
  # oracle exists (a concurrent branch owns it); skipped, never silently passed.
  # -------------------------------------------------------------------------
  field-liveness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .
      - name: field liveness ratchet (frep)
        run: |
          if python -c "import harnesscad.eval.selftest.field_liveness" 2>/dev/null; then
            python -m harnesscad.eval.gates.liveness_floor --backend frep
          else
            echo "field_liveness oracle not present on this ref; nothing to gate."
          fi

  # -------------------------------------------------------------------------
  # 4. The test suite, PER MODULE, each in its own process.
  #
  # A monolithic `unittest discover` SEGFAULTS at OCCT teardown, so a single
  # green tick from a discover run is not evidence. Each of the ~920 test modules
  # is run as an independent process; a crash in one is attributed to that one and
  # does not swallow the rest of the suite.
  # -------------------------------------------------------------------------
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .
      - name: run each test module as its own process (shard ${{ matrix.shard }}/4)
        run: |
          set -uo pipefail
          fails=0
          total=0
          i=0
          while IFS= read -r f; do
            if [ $(( i % 4 )) -ne ${{ matrix.shard }} ]; then i=$((i+1)); continue; fi
            i=$((i+1))
            total=$((total+1))
            mod="${f%.py}"
            mod="${mod//\//.}"
            if ! python -m unittest "$mod" >/tmp/out.txt 2>&1; then
              fails=$((fails+1))
              echo "::error file=$f::FAILED $mod"
              tail -n 40 /tmp/out.txt
            fi
          done < <(find tests -name 'test_*.py' | sort)
          echo "shard ${{ matrix.shard }}: $total module(s), $fails failing"
          [ "$fails" -eq 0 ]

  # -------------------------------------------------------------------------
  # 5. The orphan ledger. A capability nothing imports is not a capability.
  #    Fails when the orphan count grows past the committed ceiling.
  # -------------------------------------------------------------------------
  orphans:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .
      - name: orphan ceiling
        run: python -m unittest tests.test_registry

  # -------------------------------------------------------------------------
  # 6. THE HELD-OUT ISOLATION GATE. A private test set stops being private the
  #    moment a second module can read it. This scans every source/test file and
  #    fails if any held-out brief split (corpus OR hardcorpus) is imported by
  #    anything but its sanctioned scorer -- the mitigation the audit prescribed
  #    for benchmark contamination (14.8.1) and Goodhart's Law (14.8.3), lifted
  #    from a unit test to a standing, first-class gate that covers both splits.
  # -------------------------------------------------------------------------
  heldout-isolation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .
      - name: held-out split reachable only through its scorer
        run: python -m harnesscad.eval.gates.heldout_isolation

  # -------------------------------------------------------------------------
  # 7. THE WARNING-CHANNEL GATE. precision_floor gates the ERROR channel; this
  #    gates the WARNING one. A verifier that WARNS on the majority of provably-
  #    correct parts is uncorrelated with correctness and trains its reader to
  #    ignore it -- "not a verifier". Built from the fleet_audit KNOWN_GOOD corpus
  #    (frep, always available); --with-redteam extends it with certified attacks.
  # -------------------------------------------------------------------------
  warning-channel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .
      - name: no verifier warns on the majority of provably-correct parts
        run: python -m harnesscad.eval.gates.warning_channel --backend frep

  # -------------------------------------------------------------------------
  # 8. THE ORPHAN ENTRY POINTS. The six metric/preference modules the audit found
  #    "imported by nothing but their own test" now each have a runnable
  #    `python -m harnesscad.eval.entry.<name>` face. --selfcheck runs each on a
  #    fixed in-code fixture: it proves the wiring end to end with NO model, NO
  #    data file and NO geometry engine. A capability nothing can invoke is a
  #    decoration; this is the check that it can be invoked.
  # -------------------------------------------------------------------------
  entry-points:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .
      - name: every wired orphan is reachable and computes on its fixture
        run: |
          set -euo pipefail
          for m in judge_calibration judge_human_agreement metric_correlation \
                   pass_at_k ablation_matrix dpo_pairs; do
            echo "::group::eval.entry.$m"
            python -m "harnesscad.eval.entry.$m" --selfcheck >/dev/null
            echo "::endgroup::"
          done

  # -------------------------------------------------------------------------
  # 9. THE CORPUS GRADER, INCLUDING THE FULL MEASUREMENT VECTOR. The grader is
  #    many-to-one on the envelope families alone (a hole in the wrong place scores
  #    perfectly). eval/corpus/measurement.py composes the shape IoU and the SDF
  #    probes into one measurement vector the runner now reports; these tests drive
  #    the runner (property gate -> reference self-test -> grade -> vector) on frep.
  # -------------------------------------------------------------------------
  corpus-grader:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .
      - name: corpus grader and held-out isolation unit test
        run: |
          python -m unittest tests.eval.corpus.test_corpus
          python -m unittest tests.eval.corpus.test_holdout_isolation
